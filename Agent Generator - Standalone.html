document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">

 item.active }}? #FFFFFF : {{ colors.text }};\" onclick=\"{{ item.onClick }}\">\n        <div style=\"width:8px; height:8px; border-radius:50%; background:{{ item.active }}? #FFFFFF : {{ colors.primary }}; flex-shrink:0;\"><\u002Fdiv>\n        <div style=\"font-size:14px; font-weight:500; flex:1;\">{{ item.label }}<\u002Fdiv>\n        <sc-if value=\"{{ item.badge }}\">\n          <div style=\"background:{{ item.active }}? rgba(255,255,255,0.25) : {{ colors.badgeBg }}; color:{{ item.active }}? #FFFFFF : {{ colors.badgeText }}; font-size:11px; font-weight:700; padding:2px 7px; border-radius:10px;\">{{ item.badge }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n\n    <div style=\"flex:1;\"><\u002Fdiv>\n    <div style=\"font-size:11px; color:{{ colors.textMuted }}; padding:8px; text-align:center;\">Forge Agent Studio<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Main -->\n  <div style=\"flex:1; min-width:0; display:flex; flex-direction:column;\">\n\n    <!-- Topbar -->\n    <div style=\"display:flex; align-items:center; gap:24px; padding:16px 32px; background:#FFFFFF; border-bottom:1px solid {{ colors.border }};\">\n      <div style=\"font-size:20px; font-weight:800; color:{{ colors.primary }}; letter-spacing:-0.02em;\">Forge<\u002Fdiv>\n      <div style=\"flex:1; max-width:420px; display:flex; align-items:center; gap:8px; background:{{ colors.appBg }}; border:1px solid {{ colors.border }}; border-radius:10px; padding:9px 14px;\">\n        <div style=\"width:14px; height:14px; border-radius:50%; border:2px solid {{ colors.textMuted }};\"><\u002Fdiv>\n        <div style=\"font-size:13px; color:{{ colors.textMuted }};\">Search<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;\"><\u002Fdiv>\n      <div style=\"width:36px; height:36px; border-radius:50%; background:{{ colors.primaryLight }};\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- DASHBOARD VIEW -->\n    <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\" nt extends DCLogic {\n  state = {\n    view: 'dashboard',\n    step: 0,\n    agentName: '',\n    agentDesc: '',\n    model: 'gpt5',\n    systemPrompt: '',\n    kTab: 'files',\n    files: [\n      { name: 'onboarding-guide.pdf', size: '2.1 MB' },\n      { name: 'faq-export.csv', size: '340 KB' }\n    ],\n    driveConnections: [\n      { id: 'gdrive', name: 'Google Drive', connected: true, account: 'ashfak.sayem@company.com', orgDomain: 'company.com', plan: 'Business', permission: 'View only', fileCount: 128, folderScope: 'Shared Drive — Support Docs', lastSynced: '2 hours ago', storageUsed: 42, storageTotal: 100 },\n      { id: 'onedrive', name: 'OneDrive', connected: false, account: '', orgDomain: '', plan: 'Personal', permission: 'View only', fileCount: 0, folderScope: '', lastSynced: '', storageUsed: 0, storageTotal: 100 }\n    ],\n    qaQuestion: '',\n    qaAnswer: '',\n    qaEntries: [\n      { q: 'What are your support hours?', a: 'We are available 9am–6pm, Mon–Fri.' }\n    ],\n    tools: [\n      { id: 'web', name: 'Web Search', desc: 'Look up real-time information online', selected: true },\n      { id: 'calc', name: 'Calculator', desc: 'Perform precise numeric calculations', selected: false },\n      { id: 'code', name: 'Code Interpreter', desc: 'Run and evaluate short code snippets', selected: true },\n      { id: 'sched', name: 'Scheduler', desc: 'Create and check calendar events', selected: false },\n      { id: 'crm', name: 'CRM Lookup', desc: 'Query customer records', selected: true },\n      { id: 'img', name: 'Image Generation', desc: 'Create images from text prompts', selected: false }\n    ],\n    cTab: 'email',\n    emailProviders: [\n      { id: 'gmail', name: 'Gmail', connected: true, oauth: true, account: 'support@company.com' },\n      { id: 'outlook', name: 'Outlook / Microsoft 365', connected: false, oauth: true, account: '' },\n      { id: 'imap', name: 'IMAP / SMTP', connected: false, oauth: false, account: '' },\n      { id: 'yahoo', name: 'Yahoo Mail', connected: false, oauth: true, account: '' }\n    ],\n    dbTypes: [\n      { id: 'postgres', name: 'PostgreSQL', connected: true, port: '5432', dbName: 'production' },\n      { id: 'mysql', name: 'MySQL', connected: false, port: '3306', dbName: '' },\n      { id: 'mongo', name: 'MongoDB', connected: false, port: '27017', dbName: '' },\n      { id: 'sqlite', name: 'SQLite', connected: false, port: '', dbName: '' },\n      { id: 'redis', name: 'Redis', connected: false, port: '6379', dbName: '' },\n      { id: 'snowflake', name: 'Snowflake', connected: false, port: '443', dbName: '' }\n    ],\n    memory: { persistent: true, vectorStore: false, window: '20' },\n    config: { open: false, kind: null, id: null },\n    form: {},\n    confirmRemove: { open: false, kind: null, id: null, name: '' }\n  };\n\n  stepMeta = [\n    { title: 'Agent Setup', subtitle: 'Name your agent and define its behavior' },\n    { title: 'Knowledge Sources', subtitle: 'Connect the data this agent should reason over (RAG)' },\n    { title: 'Tool Selection', subtitle: 'Choose which tools this agent can call' },\n    { title: 'Connections', subtitle: 'Connect email accounts and databases' },\n    { title: 'Memory', subtitle: 'Configure conversation and long-term memory' },\n    { title: 'Review & Launch', subtitle: 'Confirm configuration and launch your agent' }\n  ];\n\n  modelOptions = [\n    { id: 'gpt5', label: 'GPT-5' },\n    { id: 'claude', label: 'Claude Opus' },\n    { id: 'gemini', label: 'Gemini 2.5 Pro' }\n  ];\n\n  windowChoices = ['10', '20', '50', 'Unlimited'];\n\n  goToStep = (n) => this.setState({ step: n });\n  startBuilder = () => this.setState({ view: 'builder', step: 0 });\n  goToDashboard = () => this.setState({ view: 'dashboard' });\n  nextStep = () => this.setState(s => ({ step: Math.min(s.step + 1, this.stepMeta.length - 1) }));\n  prevStep = () => this.setState(s => ({ step: Math.max(s.step - 1, 0) }));\n\n  setAgentName = (e) => this.setState({ agentName: e.target.value });\n  setAgentDesc = (e) => this.setState({ agentDesc: e.target.value });\n  setSystemPrompt = (e) => this.setState({ systemPrompt: e.target.value });\n  selectModel = (id) => this.setState({ model: id });\n\n  setKTab = (t) => this.setState({ kTab: t });\n  addMockFile = () => {\n    const names = ['product-spec.docx', 'return-policy.pdf', 'pricing-sheet.xlsx', 'call-transcript.txt'];\n    const name = names[Math.floor(Math.random() * names.length)];\n    this.setState(s => ({ files: [...s.files, { name, size: (Math.random()*3+0.2).toFixed(1) + ' MB' }] }));\n  };\n  removeFile = (idx) => this.setState(s => ({ files: s.files.filter((_, i) => i !== idx) }));\n\n  setQaQuestion = (e) => this.setState({ qaQuestion: e.target.value });\n  setQaAnswer = (e) => this.setState({ qaAnswer: e.target.value });\n  addQA = () => {\n    if (!this.state.qaQuestion.trim()) return;\n    this.setState(s => ({ qaEntries: [...s.qaEntries, { q: s.qaQuestion, a: s.qaAnswer }], qaQuestion: '', qaAnswer: '' }));\n  };\n\n  toggleTool = (id) => this.setState(s => ({ tools: s.tools.map(t => t.id === id ? { ...t, selected: !t.selected } : t) }));\n\n  setCTab = (t) => this.setState({ cTab: t });\n\n  disconnect = (kind, id) => {\n    if (kind === 'email') this.setState(s => ({ emailProviders: s.emailProviders.map(e => e.id === id ? { ...e, connected: false, account: '' } : e) }));\n    if (kind === 'db') this.setState(s => ({ dbTypes: s.dbTypes.map(d => d.id === id ? { ...d, connected: false, dbName: '' } : d) }));\n    if (kind === 'drive') this.setState(s => ({ driveConnections: s.driveConnections.map(d => d.id === id ? { ...d, connected: false, account: '', orgDomain: '', fileCount: 0, folderScope: '', lastSynced: '', storageUsed: 0 } : d) }));\n  };\n\n  openConfirmRemove = (kind, id) => {\n    const item = this.findItem(kind, id);\n    this.setState({ confirmRemove: { open: true, kind, id, name: item ? item.name : '' } });\n  };\n  cancelRemove = () => this.setState({ confirmRemove: { open: false, kind: null, id: null, name: '' } });\n  doConfirmRemove = () => {\n    const { kind, id } = this.state.confirmRemove;\n    this.disconnect(kind, id);\n    this.cancelRemove();\n  };\n\n  togglePersistent = () => this.setState(s => ({ memory: { ...s.memory, persistent: !s.memory.persistent } }));\n  toggleVectorStore = () => this.setState(s => ({ memory: { ...s.memory, vectorStore: !s.memory.vectorStore } }));\n  setWindow = (w) => this.setState(s => ({ memory: { ...s.memory, window: w } }));\n\n  // ---- Config modal ----\n  defaultsFor(kind, item) {\n    if (kind === 'email') {\n      if (item.oauth) return { account: item.account || '', scopes: ['Read inbox'], folders: ['Inbox'], freq: 'Every 15 min' };\n      return { host: '', port: '993', user: '', pass: '', smtpHost: '', smtpPort: '587', ssl: true };\n    }\n    if (kind === 'db') {\n      return { method: 'Manual', connstr: '', host: 'localhost', port: item.port || '5432', database: item.dbName || '', user: '', pass: '', ssl: true, readonly: true };\n    }\n    if (kind === 'drive') {\n      return { account: item.account || '', orgDomain: item.orgDomain || '', plan: item.plan || 'Business', permission: item.permission || 'View only', folders: ['My Drive'], types: ['All'], subfolders: true, freq: 'Hourly' };\n    }\n    return {};\n  }\n\n  schemaFor(kind, item, form) {\n    if (kind === 'email') {\n      if (item.oauth) return [\n        { key: 'account', kind: 'text', label: 'Account Email', placeholder: 'you@' + item.id + '.com' },\n        { key: 'scopes', kind: 'pills', multi: true, label: 'Permissions', options: ['Read inbox', 'Send email', 'Read attachments', 'Manage labels'] },\n        { key: 'folders', kind: 'pills', multi: true, label: 'Sync Folders / Labels', options: ['Inbox', 'Sent', 'Archive', 'Important', 'Support'] },\n        { key: 'freq', kind: 'pills', multi: false, label: 'Sync Frequency', options: ['Realtime', 'Every 15 min', 'Hourly', 'Daily'] }\n      ];\n      return [\n        { key: 'host', kind: 'text', label: 'IMAP Server', placeholder: 'imap.example.com' },\n        { key: 'port', kind: 'text', label: 'IMAP Port', placeholder: '993' },\n        { key: 'user', kind: 'text', label: 'Username', placeholder: 'you@example.com' },\n        { key: 'pass', kind: 'password', label: 'Password' },\n        { key: 'smtpHost', kind: 'text', label: 'SMTP Server', placeholder: 'smtp.example.com' },\n        { key: 'smtpPort', kind: 'text', label: 'SMTP Port', placeholder: '587' },\n        { key: 'ssl', kind: 'toggle', label: 'Use SSL / TLS', hint: 'Encrypt the connection' }\n      ];\n    }\n    if (kind === 'db') {\n      const base = [{ key: 'method', kind: 'pills', multi: false, label: 'Connection Method', options: ['Manual', 'Connection string'] }];\n      if (form.method === 'Connection string') {\n        base.push({ key: 'connstr', kind: 'text', mono: true, label: 'Connection String', placeholder: item.id + '://user:pass@host:' + (item.port || '5432') + '/db' });\n      } else {\n        base.push(\n          { key: 'host', kind: 'text', label: 'Host', placeholder: 'localhost' },\n          { key: 'port', kind: 'text', label: 'Port', placeholder: item.port || '5432' },\n          { key: 'database', kind: 'text', label: 'Database Name', placeholder: 'production' },\n          { key: 'user', kind: 'text', label: 'Username', placeholder: 'db_user' },\n          { key: 'pass', kind: 'password', label: 'Password' }\n        );\n      }\n      base.push(\n        { key: 'ssl', kind: 'toggle', label: 'Require SSL', hint: 'Reject unencrypted connections' },\n        { key: 'readonly', kind: 'toggle', label: 'Read-only access', hint: 'Agent can query but never write' }\n      );\n      return base;\n    }\n    if (kind === 'drive') {\n      return [\n        { key: 'account', kind: 'text', label: 'Business Account Email', placeholder: item.id === 'onedrive' ? 'you@outlook.com' : 'you@gmail.com' },\n        { key: 'orgDomain', kind: 'text', label: 'Organization Domain', placeholder: 'company.com (optional, for Workspace/M365)' },\n        { key: 'plan', kind: 'pills', multi: false, label: 'Account Type', options: ['Personal', 'Business', 'Enterprise'] },\n        { key: 'permission', kind: 'pills', multi: false, label: 'Access Level', options: ['View only', 'View & Edit'] },\n        { key: 'folders', kind: 'pills', multi: true, label: 'Folders to Sync', options: ['My Drive', 'Shared with me', 'Team Drive', 'Specific folder'] },\n        { key: 'types', kind: 'pills', multi: true, label: 'File Types', options: ['Docs', 'Sheets', 'Slides', 'PDF', 'Images', 'All'] },\n        { key: 'subfolders', kind: 'toggle', label: 'Include subfolders', hint: 'Recurse into nested folders' },\n        { key: 'freq', kind: 'pills', multi: false, label: 'Sync Frequency', options: ['Realtime', 'Hourly', 'Daily'] }\n      ];\n    }\n    return [];\n  }\n\n  findItem(kind, id) {\n    if (kind === 'email') return this.state.emailProviders.find(e => e.id === id);\n    if (kind === 'db') return this.state.dbTypes.find(d => d.id === id);\n    if (kind === 'drive') return this.state.driveConnections.find(d => d.id === id);\n    return null;\n  }\n\n  openConfig = (kind, id) => {\n    const item = this.findItem(kind, id);\n    this.setState({ config: { open: true, kind, id }, form: this.defaultsFor(kind, item) });\n  };\n  closeConfig = () => this.setState({ config: { open: false, kind: null, id: null } });\n  stopProp = (e) => { e.stopPropagation(); };\n  setConfigField = (k, v) => this.setState(s => ({ form: { ...s.form, [k]: v } }));\n  toggleChip = (k, v) => this.setState(s => {\n    const arr = s.form[k] || [];\n    const has = arr.includes(v);\n    return { form: { ...s.form, [k]: has ? arr.filter(x => x !== v) : [...arr, v] } };\n  });\n  saveConfig = () => {\n    const { kind, id } = this.state.config;\n    const f = this.state.form;\n    if (kind === 'email') this.setState(s => ({ emailProviders: s.emailProviders.map(e => e.id === id ? { ...e, connected: true, account: f.account || e.account } : e) }));\n    if (kind === 'db') this.setState(s => ({ dbTypes: s.dbTypes.map(d => d.id === id ? { ...d, connected: true, dbName: f.database || d.dbName } : d) }));\n    if (kind === 'drive') this.setState(s => ({ driveConnections: s.driveConnections.map(d => {\n      if (d.id !== id) return d;\n      const folderScope = (f.folders && f.folders.length) ? f.folders.join(', ') : 'My Drive';\n      return {\n        ...d, connected: true,\n        account: f.account || d.account,\n        orgDomain: f.orgDomain || d.orgDomain,\n        plan: f.plan || d.plan,\n        permission: f.permission || d.permission,\n        folderScope,\n        fileCount: d.fileCount || Math.floor(Math.random() * 150) + 20,\n        storageUsed: d.storageUsed || Math.floor(Math.random() * 60) + 10,\n        lastSynced: 'Just now'\n      };\n    }) }));\n    this.closeConfig();\n  };\n\n  renderVals() {\n    const s = this.state;\n    const colors = {\n      appBg: '#F4F5FA',\n      text: '#111827',\n      textMuted: '#6B7280',\n      border: '#E5E7EB',\n      borderLight: '#F0F1F5',\n      borderStrong: '#D1D5DB',\n      primary: '#4F46E5',\n      primaryLight: '#EEF2FF',\n      badgeBg: '#DBEAFE',\n      badgeText: '#1D4ED8'\n    };\n\n    const navItems = [\n      { label: 'Dashboard', badge: null, active: s.view === 'dashboard', onClick: this.goToDashboard },\n      { label: 'Integrations', badge: '2', active: false, onClick: () => {} },\n      { label: 'Create Agent', badge: null, active: s.view === 'builder', onClick: this.startBuilder },\n      { label: 'Tool Library', badge: null, active: false, onClick: () => {} }\n    ];\n\n    const agents = [\n      { name: 'Support Knowledge Bot', desc: 'Answers customer questions from docs + FAQ', status: 'Live', statusBg: '#D1FAE5', statusColor: '#059669', sources: 12, tools: 3, updated: '2d' },\n      { name: 'Sales Ops Assistant', desc: 'Looks up CRM records and drafts email replies', status: 'Draft', statusBg: '#FEF3C7', statusColor: '#B45309', sources: 4, tools: 5, updated: '5h' },\n      { name: 'Internal Wiki Search', desc: 'RAG over Confluence + Google Drive', status: 'Live', statusBg: '#D1FAE5', statusColor: '#059669', sources: 28, tools: 1, updated: '1w' }\n    ];\n\n    const steps = this.stepMeta.map((m, i) => ({\n      num: i + 1,\n      label: m.title,\n      state: i < s.step ? 'done' : (i === s.step ? 'active' : 'todo'),\n      hasNext: i < this.stepMeta.length - 1,\n      onClick: () => this.goToStep(i)\n    }));\n\n    const models = this.modelOptions.map(m => ({ ...m, selected: m.id === s.model, onClick: () => this.selectModel(m.id) }));\n\n    const kTabDefs = [\n      { id: 'files', label: 'Files' },\n      { id: 'drive', label: 'Google Drive / OneDrive' },\n      { id: 'text', label: 'Text & Q&A' }\n    ];\n    const kTabs = kTabDefs.map(t => ({ ...t, active: t.id === s.kTab, onClick: () => this.setKTab(t.id) }));\n\n    const cTabDefs = [\n      { id: 'email', label: 'Email' },\n      { id: 'database', label: 'Databases' }\n    ];\n    const cTabs = cTabDefs.map(t => ({ ...t, active: t.id === s.cTab, onClick: () => this.setCTab(t.id) }));\n\n    const filesList = s.files.map((f, i) => ({ ...f, remove: () => this.removeFile(i) }));\n\n    const driveConnections = s.driveConnections.map(d => ({\n      ...d,\n      notConnected: !d.connected,\n      statusText: d.connected ? 'Connected — ' + d.fileCount + ' files synced' : 'Not connected',\n      storageText: d.connected ? d.storageUsed + ' GB of ' + d.storageTotal + ' GB' : '—',\n      storagePct: d.connected ? Math.min(100, Math.round((d.storageUsed / d.storageTotal) * 100)) : 0,\n      onConnect: () => this.openConfig('drive', d.id),\n      onConfigure: () => this.openConfig('drive', d.id),\n      onRemove: () => this.openConfirmRemove('drive', d.id)\n    }));\n\n    const tools = s.tools.map(t => ({ ...t, toggle: () => this.toggleTool(t.id) }));\n\n    const emailProviders = s.emailProviders.map(e => ({\n      ...e,\n      notConnected: !e.connected,\n      statusText: e.connected ? (e.account || 'Connected') : 'Not connected',\n      onConnect: () => this.openConfig('email', e.id),\n      onConfigure: () => this.openConfig('email', e.id),\n      onRemove: () => this.openConfirmRemove('email', e.id)\n    }));\n\n    const dbTypes = s.dbTypes.map(d => ({\n      ...d,\n      notConnected: !d.connected,\n      statusText: d.connected ? (d.dbName ? d.dbName + ' · connected' : 'Connected') : 'Not connected',\n      onConnect: () => this.openConfig('db', d.id),\n      onConfigure: () => this.openConfig('db', d.id),\n      onRemove: () => this.openConfirmRemove('db', d.id)\n    }));\n\n    const windowOptions = this.windowChoices.map(w => ({ label: w, selected: s.memory.window === w, onClick: () => this.setWindow(w) }));\n\n    const selectedToolsCount = s.tools.filter(t => t.selected).length;\n    const connectedEmails = s.emailProviders.filter(e => e.connected).length;\n    const connectedDbs = s.dbTypes.filter(d => d.connected).length;\n    const connectedDrives = s.driveConnections.filter(d => d.connected).length;\n\n    const summaryRows = [\n      { label: 'Files', value: s.files.length },\n      { label: 'Drive Sources', value: connectedDrives },\n      { label: 'Q&A Entries', value: s.qaEntries.length },\n      { label: 'Tools', value: selectedToolsCount },\n      { label: 'Email Accounts', value: connectedEmails },\n      { label: 'Databases', value: connectedDbs }\n    ];\n\n    const selectedModelLabel = this.modelOptions.find(m => m.id === s.model)?.label ?? '';\n    const memorySummary = s.memory.persistent ? 'Persistent · ' + s.memory.window + ' turns' : s.memory.window + ' turns';\n\n    // Config modal fields\n    let configFields = [], configName = '', configSubtitle = '', configSaveLabel = 'Save & Connect';\n    if (s.config.open) {\n      const item = this.findItem(s.config.kind, s.config.id) || {};\n      const defs = this.schemaFor(s.config.kind, item, s.form);\n      const subtitleMap = { email: 'Email connection settings', db: 'Database connection settings', drive: 'Drive sync settings' };\n      configName = item.name || '';\n      configSubtitle = subtitleMap[s.config.kind] || '';\n      configSaveLabel = item.connected ? 'Save changes' : 'Save & Connect';\n      configFields = defs.map(d => {\n        const val = s.form[d.key];\n        if (d.kind === 'toggle') {\n          return { label: d.label, hint: d.hint || '', isToggle: true, isText: false, isPills: false, value: !!val, onToggle: () => this.setConfigField(d.key, !val) };\n        }\n        if (d.kind === 'pills') {\n          const cur = d.multi ? (val || []) : val;\n          const opts = d.options.map(o => ({\n            label: o,\n            selected: d.multi ? cur.includes(o) : cur === o,\n            onClick: d.multi ? () => this.toggleChip(d.key, o) : () => this.setConfigField(d.key, o)\n          }));\n          return { label: d.label, isPills: true, isToggle: false, isText: false, opts };\n        }\n        // text / password\n        return {\n          label: d.label,\n          isText: true, isToggle: false, isPills: false,\n          inputType: d.kind === 'password' ? 'password' : 'text',\n          mono: !!d.mono,\n          placeholder: d.placeholder || '',\n          value: val || '',\n          onInput: (e) => this.setConfigField(d.key, e.target.value)\n        };\n      });\n    }\n\n    return {\n      colors,\n      navItems,\n      isDashboard: s.view === 'dashboard',\n      isBuilder: s.view === 'builder',\n      agents,\n      startBuilder: this.startBuilder,\n      steps,\n      currentStepMeta: this.stepMeta[s.step],\n      step0: s.step === 0,\n      step1: s.step === 1,\n      step2: s.step === 2,\n      step3: s.step === 3,\n      step4: s.step === 4,\n      step5: s.step === 5,\n      agentName: s.agentName,\n      agentDesc: s.agentDesc,\n      setAgentName: this.setAgentName,\n      setAgentDesc: this.setAgentDesc,\n      systemPrompt: s.systemPrompt,\n      setSystemPrompt: this.setSystemPrompt,\n      models,\n      kTabs,\n      kTabFiles: s.kTab === 'files',\n      kTabDrive: s.kTab === 'drive',\n      kTabText: s.kTab === 'text',\n      files: filesList,\n      addMockFile: this.addMockFile,\n      driveConnections,\n      qaQuestion: s.qaQuestion,\n      qaAnswer: s.qaAnswer,\n      setQaQuestion: this.setQaQuestion,\n      setQaAnswer: this.setQaAnswer,\n      addQA: this.addQA,\n      qaEntries: s.qaEntries,\n      tools,\n      selectedToolsCount,\n      cTabs,\n      cTabEmail: s.cTab === 'email',\n      cTabDb: s.cTab === 'database',\n      emailProviders,\n      dbTypes,\n      memory: s.memory,\n      togglePersistent: this.togglePersistent,\n      toggleVectorStore: this.toggleVectorStore,\n      windowOptions,\n      agentNameOrDefault: s.agentName || 'Untitled Agent',\n      agentDescOrDefault: s.agentDesc || 'No description provided',\n      selectedModelLabel,\n      memorySummary,\n      summaryRows,\n      isFirstStep: s.step === 0,\n      nextButtonLabel: s.step === this.stepMeta.length - 1 ? 'Launch Agent' : 'Next Step',\n      nextStep: s.step === this.stepMeta.length - 1 ? this.goToDashboard : this.nextStep,\n      prevStep: this.prevStep,\n      // config modal\n      configOpen: s.config.open,\n      configName,\n      configSubtitle,\n      configSaveLabel,\n      configFields,\n      closeConfig: this.closeConfig,\n      stopProp: this.stopProp,\n      saveConfig: this.saveConfig,\n      // remove confirm modal\n      confirmRemoveOpen: s.confirmRemove.open,\n      confirmRemoveName: s.confirmRemove.name,\n      cancelRemove: this.cancelRemove,\n      confirmRemove: this.doConfirmRemove\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
